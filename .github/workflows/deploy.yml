name: 🚀 Deploy — Production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION:   "20"
  VERCEL_ORG_ID:  ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  # ── 1. Build + Type Check ──────────────────────────────────
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    outputs:
      sha_short: ${{ steps.sha.outputs.sha_short }}
    steps:
      - uses: actions/checkout@v4

      - name: Get short SHA
        id: sha
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: military-pass/package-lock.json

      - name: Install dependencies
        working-directory: military-pass
        run: npm ci

      - name: Type check
        working-directory: military-pass
        run: npx tsc --noEmit

      - name: Build
        working-directory: military-pass
        env:
          NEXT_PUBLIC_SUPABASE_URL:        ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY:   ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL:             https://militarypass.com
          NEXT_PUBLIC_PAYSTACK_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_PAYSTACK_PUBLIC_KEY }}
        run: npm run build

  # ── 2. Deploy to Vercel ────────────────────────────────────
  deploy:
    name: 🌐 Deploy to Vercel
    runs-on: ubuntu-latest
    needs: build
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: military-pass

      - name: Build for Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: military-pass

      - name: Deploy to Vercel
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> $GITHUB_OUTPUT
        working-directory: military-pass

      - name: Comment deploy URL on commit
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: `🚀 **Deployed to production**\n\n🌐 URL: ${{ steps.deploy.outputs.url }}\n🔖 Commit: \`${{ needs.build.outputs.sha_short }}\``
            })

  # ── 3. Post-deploy health check ────────────────────────────
  health-check:
    name: ✅ Health Check
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Wait for deployment
        run: sleep 20

      - name: Check app is live
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://militarypass.com)
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" != "200" ]; then exit 1; fi

      - name: Check AI worker status
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://militarypass.com/api/ai/status)
          echo "AI Worker Status: $STATUS"
